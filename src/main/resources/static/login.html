<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="auth.title">Login - Municipal Corporation</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/lang.js"></script>
</head>
<body>
    <div class="auth-container">
        <div id="languageToggleTop" style="position: absolute; top: 10px; right: 10px; z-index: 1000;"></div>
        <div class="auth-box">
            <div class="auth-header">
                <h1>🏛️ Municipal Corp</h1>
                <p data-i18n="auth.title">Login or Register</p>
            </div>

            <!-- Step 1: Phone Number -->
            <div id="phoneStep" class="auth-step active">
                <h2 data-i18n="auth.phoneStep">Enter Your Phone Number</h2>
                <form id="phoneForm">
                    <div class="form-group">
                        <label data-i18n="auth.phoneLabel">Phone Number</label>
                        <input type="tel" id="phone" pattern="[0-9]{10}" maxlength="10" 
                               data-i18n-placeholder="auth.phonePlaceholder" placeholder="Enter 10-digit mobile number" required>
                        <small data-i18n="auth.phoneHint">We'll send you an OTP to verify</small>
                    </div>
                    <div class="form-group">
                        <label data-i18n="auth.roleLabel">I am a</label>
                        <select id="role" required>
                            <option value="CITIZEN" data-i18n="auth.roleCitizen">Citizen</option>
                            <option value="LEADER" data-i18n="auth.roleLeader">Ward Officer</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" data-i18n="auth.sendOTPButton">Send OTP</button>
                </form>
            </div>

            <!-- Step 2: OTP Verification -->
            <div id="otpStep" class="auth-step">
                <h2 data-i18n="auth.otpStep">Enter OTP</h2>
                <p class="info-text"><span data-i18n="auth.otpSentTo">OTP sent to</span> <span id="phoneDisplay"></span></p>
                <form id="otpForm">
                    <div class="form-group">
                        <label data-i18n="auth.otpLabel">OTP Code</label>
                        <input type="text" id="otp" maxlength="6" pattern="[0-9]{6}" 
                               data-i18n-placeholder="auth.otpPlaceholder" placeholder="Enter 6-digit OTP" required>
                        <small data-i18n="auth.otpValid">Valid for 5 minutes</small>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" data-i18n="auth.verifyOTPButton">Verify OTP</button>
                    <button type="button" class="btn btn-secondary btn-block" onclick="goBackToPhone()" data-i18n="auth.backButton">
                        Back
                    </button>
                </form>
            </div>

            <!-- Step 3: Registration Form -->
            <div id="registerStep" class="auth-step">
                <h2 data-i18n="auth.registerStep">Complete Registration</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label data-i18n="auth.fullNameLabel">Full Name *</label>
                        <input type="text" id="name" data-i18n-placeholder="auth.fullNamePlaceholder" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="auth.emailLabel">Email *</label>
                        <input type="email" id="email" data-i18n-placeholder="auth.emailPlaceholder" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label data-i18n="auth.addressLabel">Address *</label>
                        <textarea id="address" rows="3" data-i18n-placeholder="auth.addressPlaceholder" placeholder="Enter your complete address" required></textarea>
                    </div>
                    <div class="form-group">
                        <label id="wardLabel" data-i18n="auth.wardNumberLabel">Ward Number *</label>
                        <input type="text" id="wardNumber" data-i18n-placeholder="auth.wardNumberPlaceholder" placeholder="e.g., 15" required>
                    </div>
                    <div class="form-group">
                        <label>State *</label>
                        <select id="regState" required onchange="onRegStateChange()">
                            <option value="">Select your state...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>City *</label>
                        <select id="regCity" required onchange="onRegCityChange()">
                            <option value="">Select your city...</option>
                        </select>
                    </div>
                    <div class="form-group" id="leaderSelectGroup" style="display:none;">
                        <label data-i18n="auth.wardOfficerLabel">Ward Officer *</label>
                        <select id="leaderId" required>
                            <option value="" data-i18n="auth.wardOfficerSelect">Select...</option>
                        </select>
                        <small id="leaderHelp" style="color:var(--text-muted,#888);margin-top:4px;display:block;"></small>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" data-i18n="auth.registerButton">Complete Registration</button>
                </form>
            </div>

            <div class="auth-footer">
                <a href="index.html" data-i18n="auth.backToHome">← Back to Home</a>
            </div>

            <!-- Alert Messages -->
            <div id="alertContainer"></div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Add language toggle to login page
        document.addEventListener('DOMContentLoaded', () => {
            // Only create toggle if it hasn't been created by lang.js already
            if (!document.getElementById('langSelect')) {
                const toggleContainer = document.getElementById('languageToggleTop');
                if (toggleContainer) {
                    const currentLang = getLanguage();
                    const select = document.createElement('select');
                    select.id = 'langSelect';
                    select.style.cssText = `
                        padding: 8px 12px;
                        border: 2px solid rgba(255,255,255,0.4);
                        border-radius: 4px;
                        background-color: rgba(255,255,255,0.15);
                        color: white;
                        font-size: 0.95em;
                        cursor: pointer;
                        font-weight: 500;
                    `;
                    
                    const enOption = document.createElement('option');
                    enOption.value = 'en';
                    enOption.textContent = 'English';
                    enOption.selected = currentLang === 'en';
                    select.appendChild(enOption);
                    
                    const hiOption = document.createElement('option');
                    hiOption.value = 'hi';
                    hiOption.textContent = 'हिंदी';
                    hiOption.selected = currentLang === 'hi';
                    select.appendChild(hiOption);
                    
                    select.addEventListener('change', (e) => {
                        setLanguage(e.target.value);
                    });
                    
                    toggleContainer.appendChild(select);
                }
            }
            
            applyPageTranslations();
        });
    </script>
</body>
</html>
