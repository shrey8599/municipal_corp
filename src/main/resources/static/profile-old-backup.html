<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Municipal Corporation</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h2>🏛️ Municipal Corp</h2>
            </div>
            <div class="nav-menu">
                <span id="userName" class="user-name"></span>
                <button onclick="logout()" class="btn btn-secondary btn-sm">Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li id="newComplaintLink"><a href="create-ticket.html">➕ New Complaint</a></li>
                <li><a href="dashboard.html">📋 My Complaints</a></li>
                <li id="contactLeaderLink" style="display: none;"><a href="contact-leader.html">📞 Contact Ward Officer</a></li>
                <li class="active"><a href="profile.html">👤 Profile</a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="profile-container">
                <h1>My Profile</h1>
                
                <!-- Profile Picture Section (Leaders only) -->
                <div id="profilePictureSection" class="section" style="display: none;">
                    <h3>Profile Picture</h3>
                    <div style="display: flex; align-items: center; gap: 20px; margin-top: 15px;">
                        <div class="profile-picture-preview">
                            <img id="profilePicPreview" src="/images/default-avatar.png" alt="Profile" 
                                 style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid var(--primary-color);">
                        </div>
                        <div>
                            <input type="file" id="profilePicInput" accept="image/*" style="display: none;">
                            <button onclick="document.getElementById('profilePicInput').click()" class="btn btn-primary">
                                📷 Upload Picture
                            </button>
                            <p style="color: var(--text-muted); margin-top: 10px; font-size: 0.9em;">
                                Max 5MB. JPG, PNG, or GIF
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Profile Information -->
                <div class="section">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h3>Personal Information</h3>
                        <button id="editBtn" onclick="toggleEdit()" class="btn btn-secondary btn-sm">
                            ✏️ Edit
                        </button>
                    </div>
                    
                    <form id="profileForm" style="margin-top: 20px;">
                        <div class="form-group">
                            <label>Full Name *</label>
                            <input type="text" id="name" disabled required>
                        </div>
                        
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="phone" disabled>
                        </div>
                        
                        <div class="form-group">
                            <label>Email *</label>
                            <input type="email" id="email" disabled required>
                        </div>
                        
                        <div class="form-group" id="addressGroup">
                            <label>Address *</label>
                            <textarea id="address" rows="3" disabled required></textarea>
                        </div>
                        
                        <div class="form-group" id="wardGroup">
                            <label id="wardLabel">Ward Number</label>
                            <input type="text" id="wardNumber" disabled>
                        </div>
                        
                        <div class="form-group" id="jurisdictionGroup" style="display: none;">
                            <label>Jurisdiction</label>
                            <input type="text" id="jurisdiction" disabled>
                        </div>
                        
                        <div class="form-group" id="designationGroup" style="display: none;">
                            <label>Designation</label>
                            <input type="text" id="designation" disabled>
                        </div>
                        
                        <div id="formActions" style="display: none; margin-top: 20px;">
                            <button type="submit" class="btn btn-primary">💾 Save Changes</button>
                            <button type="button" onclick="cancelEdit()" class="btn btn-secondary">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <!-- Alert Messages -->
    <div id="alertContainer"></div>

    <script src="js/common.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
