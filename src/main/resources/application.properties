spring.application.name=municipal-corp
server.port=${PORT:9999}

# MySQL Database Configuration
# Local: set MYSQL_URL / MYSQL_USER / MYSQL_PASSWORD env vars, or use the defaults below
# Railway: set MYSQL_URL (jdbc:mysql://...), MYSQL_USER, MYSQL_PASSWORD in Railway dashboard
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/municipal_corp?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:shrey8599}
spring.datasource.password=${MYSQL_PASSWORD:BEAMER@123beamer}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Data Initialization - Disabled (using DataInitializer instead for proper ordering)
spring.sql.init.mode=never

# File upload configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# Logging
logging.level.com.example.municipalcorp=DEBUG

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256Algorithm
jwt.expiration=86400000

# SpringDoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Server Timezone Configuration - Always use UTC for consistency
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
